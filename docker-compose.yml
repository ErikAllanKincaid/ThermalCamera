services:
  thermal:
    build: .
    devices:
      # Docker does not follow udev symlinks when creating device cgroups.
      # Use ./start.sh instead of `docker compose up` directly -- it resolves
      # /dev/thermal_cam to the real /dev/videoN path and sets THERMAL_DEVICE_HOST.
      # Fallback: set THERMAL_DEVICE_HOST manually before running docker compose.
      - "${THERMAL_DEVICE_HOST:-/dev/thermal_cam}:/dev/thermal_cam"
    ports:
      # ${THERMAL_PORT:-7700}: use THERMAL_PORT env var on the host to change the port without
      # editing this file. Both host and container port change together.
      # Example: THERMAL_PORT=9000 docker compose up
      - "${THERMAL_PORT:-7700}:${THERMAL_PORT:-7700}"
    volumes:
      # Snapshots and recordings are written to ./recordings on the host.
      # The container sees this as /data (SAVE_DIR env var).
      - ./recordings:/data
    environment:
      - THERMAL_DEVICE=/dev/thermal_cam
      - SAVE_DIR=/data
      - THERMAL_PORT=${THERMAL_PORT:-7700}
    restart: unless-stopped
